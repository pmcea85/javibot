<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviBot - Detector de IA</title>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { background: #ffffff; max-width: 700px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; }
        .config-btn { float: right; cursor: pointer; font-size: 24px; border: none; background: none; }
        #modulo-entrenamiento { display: none; background: #202124; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        .btn-analizar { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-analizar:hover { background: #1557b0; }
        #resultado { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; background: #e8f0fe; border: 1px solid #1a73e8; }
    </style>
</head>
<body>

    <div class="container">
        <button class="config-btn" onclick="toggleEntrenamiento()">⚙️</button>
        <h1>🤖 JaviBot</h1>
        <p style="text-align: center; color: #5f6368;">Análisis de autoría académica</p>

        <div id="modulo-entrenamiento">
            <h3>Calibración</h3>
            <label>Ejemplos Humanos:</label>
            <textarea id="ejemplo_humano" style="height: 60px;"></textarea>
            <label>Ejemplos IA:</label>
            <textarea id="ejemplo_ia" style="height: 60px;"></textarea>
            <button onclick="guardarEntrenamiento()" style="margin-top:10px; padding: 5px 10px;">Guardar</button>
        </div>

        <div style="margin: 20px 0; text-align: center; background: #f8fbff; padding: 10px; border: 1px dashed #1a73e8;">
            <p>Pega el texto directamente en el cuadro de abajo para analizarlo:</p>
        </div>

        <textarea id="texto_input" placeholder="Pega el informe o ensayo del alumno aquí..."></textarea>
        
        <button class="btn-analizar" id="btn-submit" onclick="analizarTexto()">Analizar ahora</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        // Funciones básicas de la interfaz
        function toggleEntrenamiento() {
            const m = document.getElementById('modulo-entrenamiento');
            m.style.display = (m.style.display === 'block') ? 'none' : 'block';
        }

        function guardarEntrenamiento() {
            localStorage.setItem('javibot_humano', document.getElementById('ejemplo_humano').value);
            localStorage.setItem('javibot_ia', document.getElementById('ejemplo_ia').value);
            alert("Calibración guardada en el navegador.");
        }

        window.onload = () => {
            document.getElementById('ejemplo_humano').value = localStorage.getItem('javibot_humano') || "";
            document.getElementById('ejemplo_ia').value = localStorage.getItem('javibot_ia') || "";
        };

        // Conexión limpia con Vercel
        async function analizarTexto() {
            const texto = document.getElementById('texto_input').value;
            const div = document.getElementById('resultado');
            const btn = document.getElementById('btn-submit');
            
            if(!texto.trim()) return alert("Por favor, ingresa un texto primero.");

            btn.disabled = true;
            btn.innerText = "JaviBot analizando... ⏳";
            div.style.display = "block";
            div.innerHTML = "<p>🔍 Analizando patrones léxicos...</p>";

            try {
                const res = await fetch('/api/evaluar_texto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        texto: texto,
                        humanos: localStorage.getItem('javibot_humano') || "",
                        ia: localStorage.getItem('javibot_ia') || ""
                    })
                });
                
                if (!res.ok) {
                    const txtErr = await res.text();
                    throw new Error("Respuesta de error del servidor: " + txtErr);
                }

                const datos = await res.json();
                
                let probabilidad = datos.probabilidad_ia ?? 50;
                let colorAlerta = "#27ae60"; 
                if (probabilidad > 75) colorAlerta = "#c0392b"; 
                else if (probabilidad > 40) colorAlerta = "#f39c12";

                div.innerHTML = `
                    <h3 style="color: ${colorAlerta}; margin-top: 0;">Veredicto: ${datos.veredicto || 'No disponible'}</h3>
                    <p><strong>Probabilidad de IA:</strong> ${probabilidad}%</p>
                    <p style="line-height: 1.4;"><strong>Análisis:</strong> ${datos.analisis || 'Sin detalles'}</p>
                `;
            } catch (e) {
                div.innerHTML = `
                    <div style="color:#c0392b; padding:12px; background:#fdf2f2; border:1px solid #f5c6cb; border-radius:6px; font-family:monospace;">
                        🛑 <strong>Error de Diagnóstico:</strong><br>${e.message}
                    </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Analizar ahora";
            }
        }
    </script>
</body>
</html>
