<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviBot - Detector de IA Académico</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 800px; margin: 0 auto; padding: 20px; }
        .container { background-color: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: relative; }
        
        .header-container { display: flex; justify-content: center; align-items: center; position: relative; margin-bottom: 10px; }
        h1 { color: #2c3e50; text-align: center; margin-right: 10px; font-size: 2.2em; margin-bottom: 5px; }
        .javibot-logo { font-size: 1.8em; margin-right: 10px; }
        .config-btn { cursor: pointer; font-size: 24px; opacity: 0.5; transition: opacity 0.3s; border: none; background: none; }
        .config-btn:hover { opacity: 1; }
        
        #modulo-entrenamiento { display: none; background-color: #2c3e50; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .training-box label { font-weight: bold; display: block; margin-bottom: 5px; color: #a3e4d7; }
        .training-box textarea { width: 100%; height: 100px; margin-bottom: 15px; font-size: 14px; padding: 10px; border-radius: 4px; border: none; box-sizing: border-box; }
        .save-btn { background-color: #f39c12; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .save-btn:hover { background-color: #e67e22; }
        
        .upload-section { background-color: #eef2f5; padding: 20px; border-radius: 8px; border: 2px dashed #bdc3c7; text-align: center; margin-bottom: 20px; }
        input[type="file"] { display: none; }
        .file-label { background-color: #3498db; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; display: inline-block; transition: background 0.3s; }
        .file-label:hover { background-color: #2980b9; }
        #estado_archivo { display: block; margin-top: 10px; font-size: 14px; color: #7f8c8d; font-weight: bold; }

        .main-text { width: 100%; height: 250px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 20px; resize: vertical; }
        .btn-analizar { background-color: #27ae60; color: white; border: none; padding: 15px 24px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: background 0.3s; }
        .btn-analizar:hover { background-color: #2ecc71; }
        .btn-analizar:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #resultado { margin-top: 25px; display: none; }
        .resultado-box { padding: 25px; border-radius: 8px; background-color: #fafafa; border: 1px solid #ddd; }
        .rango-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; color: white; font-weight: bold; font-size: 1.1em; margin: 15px 0; }
        .evidencia-texto { background: white; padding: 15px; border-radius: 6px; border: 1px solid #eee; margin-top: 10px; line-height: 1.6; color: #2c3e50; }
        
        .footer-gemini { text-align: center; margin-top: 30px; font-size: 14px; color: #7f8c8d; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-container">
            <span class="javibot-logo">🤖</span>
            <h1>JaviBot</h1>
            <button class="config-btn" onclick="toggleEntrenamiento()" title="Calibración de JaviBot" type="button">⚙️</button>
        </div>
        <p style="text-align: center; color: #7f8c8d; margin-top: -5px; margin-bottom: 25px;">Asistente de Análisis Léxico Universitario</p>
        
        <div id="modulo-entrenamiento">
            <h3>Centro de Calibración</h3>
            <div class="training-box">
                <label>Ejemplos HUMANOS:</label>
                <textarea id="ejemplo_humano" placeholder="Pega aquí extractos de informes reales..."></textarea>
            </div>
            <div class="training-box">
                <label>Ejemplos de IA:</label>
                <textarea id="ejemplo_ia" placeholder="Pega aquí extractos de ChatGPT..."></textarea>
            </div>
            <button class="save-btn" onclick="guardarEntrenamiento()" type="button">Guardar Calibración</button>
        </div>

        <div class="upload-section">
            <p style="margin-top: 0;">Sube un documento PDF o Word (.docx):</p>
            <label class="file-label">
                <input type="file" id="file_upload" accept=".pdf, .docx" />
                📄 Cargar Documento
            </label>
            <span id="estado_archivo">Ningún archivo seleccionado.</span>
        </div>

        <textarea id="texto_input" class="main-text" placeholder="Pega el texto a evaluar aquí..."></textarea>
        
        <button class="btn-analizar" id="btn-submit" onclick="analizarTexto()" type="button">Analizar con JaviBot</button>
        
        <div id="resultado"></div>

        <div class="footer-gemini">✨ Potenciado por Google Gemini en Vercel</div>
    </div>

    <script>
        // 1. FUNCIONES PRINCIPALES PROTEGIDAS (Cargan de inmediato)
        function toggleEntrenamiento() {
            const mod = document.getElementById('modulo-entrenamiento');
            mod.style.display = mod.style.display === 'block' ? 'none' : 'block';
        }

        function guardarEntrenamiento() {
            localStorage.setItem('javibot_humano', document.getElementById('ejemplo_humano').value);
            localStorage.setItem('javibot_ia', document.getElementById('ejemplo_ia').value);
            alert("Memoria calibrada correctamente.");
        }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('ejemplo_humano').value = localStorage.getItem('javibot_humano') || "";
            document.getElementById('ejemplo_ia').value = localStorage.getItem('javibot_ia') || "";
        });

        async function analizarTexto() {
            const texto = document.getElementById('texto_input').value;
            const divResultado = document.getElementById('resultado');
            const btn = document.getElementById('btn-submit');
            
            if(!texto.trim()) {
                alert("Ingresa o carga un texto primero.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "JaviBot razonando justificación... ⏳";
            divResultado.style.display = "block";
            divResultado.innerHTML = "<div class='resultado-box'><p>🔍 Analizando estructura léxica y redactando informe...</p></div>";

            try {
                const respuesta = await fetch('/api/evaluar_texto', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        texto: texto,
                        humanos: localStorage.getItem('javibot_humano') || "",
                        ia: localStorage.getItem('javibot_ia') || ""
                    })
                });

                const textoCrudo = await respuesta.text();
                let datos;
                
                try {
                    datos = JSON.parse(textoCrudo);
                } catch(e) {
                    throw new Error("Fallo de comunicación interna. Detalle: " + textoCrudo.substring(0, 100));
                }

                if (datos.error) { throw new Error(datos.error); }

                // Sistema de Semáforo
                let nivel = (datos.nivel_sospecha || "Bajo").toLowerCase();
                let colorPrimario = "#27ae60"; // Verde
                let icono = "🟢";
                let tituloNivel = "Sospecha Baja o Nula";

                if (nivel.includes("alto") || nivel.includes("alta")) {
                    colorPrimario = "#c0392b"; // Rojo
                    icono = "🔴";
                    tituloNivel = "Alta Sospecha de IA";
                } else if (nivel.includes("moderado") || nivel.includes("moderada")) {
                    colorPrimario = "#f39c12"; // Amarillo
                    icono = "🟡";
                    tituloNivel = "Sospecha Moderada de IA";
                }

                const textoJustificacion = (datos.justificacion || "Sin detalles adicionales.").replace(/\\n/g, '<br>').replace(/\n/g, '<br>');

                divResultado.innerHTML = `
                    <div class="resultado-box" style="border-top: 5px solid ${colorPrimario};">
                        <h2 style="color: ${colorPrimario}; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                            ${icono} ${tituloNivel}
                        </h2>
                        
                        <div class="rango-badge" style="background-color: ${colorPrimario};">
                            Rango Estimado: ${datos.rango_minimo}% - ${datos.rango_maximo}%
                        </div>

                        <h4 style="margin-bottom: 5px; color: #2c3e50;">🧠 Justificación Analítica:</h4>
                        <div class="evidencia-texto">
                            ${textoJustificacion}
                        </div>
                    </div>
                `;

            } catch (error) {
                divResultado.innerHTML = `
                    <div class="resultado-box" style="border-top: 5px solid #c0392b; background: #fdf2f2;">
                        🛑 <strong>Error en el proceso:</strong><br><br>${error.message}
                    </div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Analizar con JaviBot";
            }
        }

        // 2. LECTOR DE ARCHIVOS (Aislado al final para no bloquear los botones)
        window.addEventListener('load', () => {
            try { 
                if (window.pdfjsLib) {
                    window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js'; 
                }
            } catch (e) { console.warn("Librería PDF diferida."); }

            const fileInput = document.getElementById('file_upload');
            if(fileInput) {
                fileInput.addEventListener('change', async function(e) {
                    const file = e.target.files[0];
                    const estadoTexto = document.getElementById('estado_archivo');
                    const textArea = document.getElementById('texto_input');
                    if (!file) return;
                    estadoTexto.textContent = "⏳ Extrayendo texto...";
                    estadoTexto.style.color = "#d35400";
                    textArea.value = ""; 
                    const ext = file.name.split('.').pop().toLowerCase();
                    try {
                        if (ext === 'pdf' && window.pdfjsLib) {
                            const reader = new FileReader();
                            reader.onload = async function() {
                                try {
                                    const typedarray = new Uint8Array(this.result);
                                    const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                                    let fullText = "";
                                    for (let i = 1; i <= pdf.numPages; i++) {
                                        const page = await pdf.getPage(i);
                                        const content = await page.getTextContent();
                                        fullText += content.items.map(item => item.str).join(' ') + " \n\n";
                                    }
                                    textArea.value = fullText;
                                    estadoTexto.textContent = "✅ PDF extraído con éxito.";
                                    estadoTexto.style.color = "#27ae60";
                                } catch (err) { estadoTexto.textContent = "❌ Error al leer PDF."; estadoTexto.style.color = "#c0392b"; }
                            };
                            reader.readAsArrayBuffer(file);
                        } else if (ext === 'docx' && window.mammoth) {
                            const reader = new FileReader();
                            reader.onload = function(event) {
                                window.mammoth.extractRawText({arrayBuffer: event.target.result})
                                    .then(r => { textArea.value = r.value; estadoTexto.textContent = "✅ Word extraído con éxito."; estadoTexto.style.color = "#27ae60"; })
                                    .catch(() => { estadoTexto.textContent = "❌ Error al leer Word."; estadoTexto.style.color = "#c0392b"; });
                            };
                            reader.readAsArrayBuffer(file);
                        } else {
                            estadoTexto.textContent = "❌ Formato no compatible o librerías bloqueadas."; 
                            estadoTexto.style.color = "#c0392b";
                        }
                    } catch (error) { estadoTexto.textContent = "❌ Error general al abrir el archivo."; estadoTexto.style.color = "#c0392b"; }
                });
            }
        });
    </script>
</body>
</html>
