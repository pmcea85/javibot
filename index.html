<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviBot - Detector de IA</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; display: block !important; }
        .container { background: #ffffff; max-width: 700px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; text-align: center; margin-top: 10px; }
        .config-btn { float: right; cursor: pointer; font-size: 24px; border: none; background: none; padding: 5px; }
        #modulo-entrenamiento { display: none; background: #202124; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        #modulo-entrenamiento label { display: block; margin-top: 10px; font-weight: bold; }
        textarea { width: 100%; height: 150px; margin-top: 10px; border-radius: 5px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; font-size: 14px; }
        .upload-section { border: 2px dashed #1a73e8; padding: 20px; text-align: center; margin: 20px 0; border-radius: 8px; background: #f8fbff; }
        .btn-analizar { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-analizar:hover { background: #1557b0; }
        #resultado { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; background: #e8f0fe; border: 1px solid #1a73e8; }
    </style>
</head>
<body>

    <div class="container">
        <button class="config-btn" onclick="toggleEntrenamiento()" type="button">⚙️</button>
        <h1>🤖 JaviBot</h1>
        <p style="text-align: center; color: #5f6368;">Análisis de autoría académica</p>

        <div id="modulo-entrenamiento">
            <h3>Calibración</h3>
            <label>Ejemplos Humanos:</label>
            <textarea id="ejemplo_humano" style="height: 60px;"></textarea>
            <label>Ejemplos IA:</label>
            <textarea id="ejemplo_ia" style="height: 60px;"></textarea>
            <button onclick="guardarEntrenamiento()" type="button" style="margin-top:10px; padding: 5px 15px; cursor: pointer;">Guardar</button>
        </div>

        <div class="upload-section">
            <p>Carga un archivo (PDF o Word):</p>
            <input type="file" id="file_upload" accept=".pdf, .docx">
            <p id="estado_archivo" style="font-size: 13px; color: #1a73e8; font-weight: bold; margin-top: 10px;"></p>
        </div>

        <textarea id="texto_input" placeholder="El texto aparecerá aquí de forma automática al cargar un archivo, o puedes pegarlo directamente..."></textarea>
        
        <button class="btn-analizar" id="btn-submit" onclick="analizarTexto()" type="button">Analizar ahora</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        // Configuración segura del Worker de PDF.js para evitar que se congele el navegador
        try {
            if (typeof window !== 'undefined' && window['pdfjs-dist/build/pdf']) {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
            }
        } catch (e) {
            console.log("Aviso de inicialización de PDF worker.");
        }

        // Lógica de lectura de archivos (PDF/Word)
        document.getElementById('file_upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            const estado = document.getElementById('estado_archivo');
            const textArea = document.getElementById('texto_input');
            if (!file) return;
            
            estado.textContent = "⏳ Procesando documento... por favor espera.";
            textArea.value = "";
            
            const ext = file.name.split('.').pop().toLowerCase();
            try {
                if (ext === 'pdf') {
                    const reader = new FileReader();
                    reader.onload = async function() {
                        try {
                            const typedarray = new Uint8Array(this.result);
                            // Carga directa usando la librería global externa
                            const pdf = await window.pdfjsLib.getDocument(typedarray).promise;
                            let text = "";
                            for (let i = 1; i <= pdf.numPages; i++) {
                                const page = await pdf.getPage(i);
                                const content = await page.getTextContent();
                                text += content.items.map(item => item.str).join(' ') + " ";
                            }
                            textArea.value = text;
                            estado.textContent = "✅ PDF cargado con éxito.";
                        } catch (errPdf) {
                            estado.textContent = "❌ Error al extraer texto del PDF.";
                            console.error(errPdf);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } else if (ext === 'docx') {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        window.mammoth.extractRawText({arrayBuffer: event.target.result})
                            .then(r => {
                                textArea.value = r.value;
                                estado.textContent = "✅ Word cargado con éxito.";
                            })
                            .catch(errDocx => {
                                estado.textContent = "❌ Error al procesar el archivo Word.";
                            });
                    };
                    reader.readAsArrayBuffer(file);
